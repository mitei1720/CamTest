<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 63 Puzzle</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
      background:
        radial-gradient(circle at top left, #202060, transparent 35%),
        radial-gradient(circle at bottom right, #7b1fa2, transparent 35%),
        linear-gradient(135deg, #050510, #101020);
    }

    #canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .ui {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: min(360px, calc(100vw - 32px));
      padding: 16px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(14px);
      box-shadow: 0 0 28px rgba(0, 234, 255, 0.18);
    }

    h1 {
      font-size: 1.65rem;
      margin-bottom: 8px;
      text-shadow:
        0 0 10px rgba(0, 234, 255, 0.9),
        0 0 24px rgba(255, 78, 205, 0.45);
    }

    .description {
      font-size: 0.86rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.78);
      margin-bottom: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      padding: 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.12);
      text-align: center;
    }

    .label {
      font-size: 0.68rem;
      color: rgba(255, 255, 255, 0.58);
      margin-bottom: 4px;
    }

    .value {
      font-size: 1.05rem;
      font-weight: 900;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      flex: 1;
      min-width: 100px;
      border: none;
      border-radius: 999px;
      padding: 11px 12px;
      color: white;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(90deg, #00eaff, #ff4ecd);
      box-shadow: 0 0 18px rgba(0, 234, 255, 0.28);
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: none;
    }

    .message {
      min-height: 48px;
      font-size: 0.88rem;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.86);
    }

    .clear {
      color: #ffe66d;
      font-weight: 900;
      text-shadow: 0 0 12px rgba(255, 230, 109, 0.85);
    }

    .help {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.84rem;
      line-height: 1.65;
    }

    @media (max-width: 720px) {
      .ui {
        top: 10px;
        left: 10px;
        width: calc(100vw - 20px);
      }

      .help {
        display: none;
      }

      h1 {
        font-size: 1.35rem;
      }

      .description {
        font-size: 0.78rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <section class="ui">
    <h1>3D 63 PUZZLE</h1>
    <p class="description">
      4×4×4の立体スライドパズル。空白マスに3次元的に隣接するタイルだけ動かせます。
    </p>

    <div class="stats">
      <div class="stat">
        <div class="label">MOVES</div>
        <div class="value" id="moves">0</div>
      </div>
      <div class="stat">
        <div class="label">TIME</div>
        <div class="value" id="time">0.0s</div>
      </div>
      <div class="stat">
        <div class="label">BEST</div>
        <div class="value" id="best">--</div>
      </div>
    </div>

    <div class="buttons">
      <button id="shuffleBtn">シャッフル</button>
      <button id="resetBtn" class="secondary">リセット</button>
      <button id="hintBtn" class="secondary">ヒント</button>
    </div>

    <p class="message" id="message">
      ドラッグで回転、ホイールでズーム。シャッフルして開始！
    </p>
  </section>

  <section class="help">
    <strong>操作</strong><br>
    ・ドラッグ：キューブ回転<br>
    ・ホイール：ズーム<br>
    ・タイルをクリック：移動<br>
    ・黄色いワイヤー：空白マス<br>
    ・ヒントON：動かせるタイルが光る
  </section>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const canvas = document.getElementById("canvas");
    const movesEl = document.getElementById("moves");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");
    const messageEl = document.getElementById("message");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const hintBtn = document.getElementById("hintBtn");

    const N = 4;
    const TOTAL = N * N * N;
    const goal = Array.from({ length: TOTAL }, (_, i) => {
      return i === TOTAL - 1 ? 0 : i + 1;
    });

    let tiles = [...goal];
    let moves = 0;
    let started = false;
    let cleared = false;
    let startTime = 0;
    let timerId = null;
    let showHints = false;

    const tileMeshes = [];
    let emptyWire = null;

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x050510, 10, 28);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(7.8, 6.4, 9.2);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 6;
    controls.maxDistance = 22;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
    dirLight.position.set(5, 8, 7);
    scene.add(dirLight);

    const pointLight1 = new THREE.PointLight(0x00eaff, 3.0, 25);
    pointLight1.position.set(-5, 4, 5);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xff4ecd, 2.7, 25);
    pointLight2.position.set(5, -4, -5);
    scene.add(pointLight2);

    const cubeGroup = new THREE.Group();
    scene.add(cubeGroup);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const tileGeometry = new THREE.BoxGeometry(0.88, 0.88, 0.88);
    const spacing = 1.18;

    updateBestDisplay();
    buildSceneFromTiles();

    function indexToXYZ(index) {
      const z = Math.floor(index / (N * N));
      const rest = index % (N * N);
      const y = Math.floor(rest / N);
      const x = rest % N;
      return { x, y, z };
    }

    function xyzToIndex(x, y, z) {
      return z * N * N + y * N + x;
    }

    function positionFromIndex(index) {
      const { x, y, z } = indexToXYZ(index);

      return new THREE.Vector3(
        (x - 1.5) * spacing,
        (1.5 - y) * spacing,
        (z - 1.5) * spacing
      );
    }

    function getEmptyIndex() {
      return tiles.indexOf(0);
    }

    function isNeighbor3D(a, b) {
      const A = indexToXYZ(a);
      const B = indexToXYZ(b);

      const distance =
        Math.abs(A.x - B.x) +
        Math.abs(A.y - B.y) +
        Math.abs(A.z - B.z);

      return distance === 1;
    }

    function getMovableIndexes(emptyIndex) {
      const { x, y, z } = indexToXYZ(emptyIndex);
      const indexes = [];

      if (x > 0) indexes.push(xyzToIndex(x - 1, y, z));
      if (x < N - 1) indexes.push(xyzToIndex(x + 1, y, z));
      if (y > 0) indexes.push(xyzToIndex(x, y - 1, z));
      if (y < N - 1) indexes.push(xyzToIndex(x, y + 1, z));
      if (z > 0) indexes.push(xyzToIndex(x, y, z - 1));
      if (z < N - 1) indexes.push(xyzToIndex(x, y, z + 1));

      return indexes;
    }

    function createTileTexture(number, isCorrect, isMovable) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 256;

      const ctx = canvas.getContext("2d");

      const hue = (number * 31) % 360;

      const grad = ctx.createLinearGradient(0, 0, 256, 256);

      if (isCorrect) {
        grad.addColorStop(0, "#ffe66d");
        grad.addColorStop(1, "#ff4ecd");
      } else if (isMovable) {
        grad.addColorStop(0, "#66ffcc");
        grad.addColorStop(1, "#00eaff");
      } else {
        grad.addColorStop(0, `hsl(${hue}, 90%, 58%)`);
        grad.addColorStop(1, `hsl(${(hue + 70) % 360}, 90%, 42%)`);
      }

      ctx.fillStyle = grad;
      roundRect(ctx, 16, 16, 224, 224, 34);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.65)";
      ctx.lineWidth = isMovable ? 12 : 6;
      roundRect(ctx, 16, 16, 224, 224, 34);
      ctx.stroke();

      ctx.shadowColor = "rgba(0,0,0,0.65)";
      ctx.shadowBlur = 8;
      ctx.fillStyle = "white";
      ctx.font = "900 92px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(number), 128, 134);

      ctx.shadowBlur = 0;
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.font = "700 24px system-ui, sans-serif";
      ctx.fillText("63 PUZZLE", 128, 210);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function clearCubeGroup() {
      while (cubeGroup.children.length > 0) {
        const obj = cubeGroup.children.pop();

        if (obj.geometry) obj.geometry.dispose();

        if (obj.material) {
          if (Array.isArray(obj.material)) {
            obj.material.forEach((mat) => {
              if (mat.map) mat.map.dispose();
              mat.dispose();
            });
          } else {
            if (obj.material.map) obj.material.map.dispose();
            obj.material.dispose();
          }
        }
      }

      tileMeshes.length = 0;
      emptyWire = null;
    }

    function buildSceneFromTiles() {
      clearCubeGroup();

      const emptyIndex = getEmptyIndex();
      const movableIndexes = getMovableIndexes(emptyIndex);

      for (let i = 0; i < TOTAL; i++) {
        const number = tiles[i];
        const pos = positionFromIndex(i);

        if (number === 0) {
          const emptyGeometry = new THREE.BoxGeometry(0.92, 0.92, 0.92);
          const emptyEdges = new THREE.EdgesGeometry(emptyGeometry);
          const emptyMaterial = new THREE.LineBasicMaterial({
            color: 0xffe66d
          });

          emptyWire = new THREE.LineSegments(emptyEdges, emptyMaterial);
          emptyWire.position.copy(pos);
          cubeGroup.add(emptyWire);
          continue;
        }

        const isCorrect = number === goal[i];
        const isMovable = showHints && movableIndexes.includes(i);

        const texture = createTileTexture(number, isCorrect, isMovable);

        const material = new THREE.MeshStandardMaterial({
          map: texture,
          roughness: 0.38,
          metalness: 0.28,
          emissive: isMovable ? new THREE.Color(0x003333) : new THREE.Color(0x000000),
          transparent: true,
          opacity: 0.96
        });

        const mesh = new THREE.Mesh(tileGeometry, material);
        mesh.position.copy(pos);
        mesh.userData.index = i;
        mesh.userData.number = number;

        const edgeGeometry = new THREE.EdgesGeometry(tileGeometry);
        const edgeMaterial = new THREE.LineBasicMaterial({
          color: isMovable ? 0xffffff : 0x111111,
          transparent: true,
          opacity: isMovable ? 0.95 : 0.4
        });
        const edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
        edges.position.copy(pos);
        edges.userData.isEdge = true;

        cubeGroup.add(mesh);
        cubeGroup.add(edges);

        tileMeshes.push(mesh);
      }

      movesEl.textContent = moves;
    }

    function moveTile(index) {
      if (cleared) return;

      const emptyIndex = getEmptyIndex();

      if (!isNeighbor3D(index, emptyIndex)) {
        messageEl.textContent = "そのタイルは動かせない！空白マスに隣接したタイルをクリックしてね。";
        return;
      }

      if (!started) {
        startTimer();
        started = true;
      }

      [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
      moves++;

      buildSceneFromTiles();

      if (isSolved()) {
        gameClear();
      } else {
        messageEl.textContent = "移動成功。キューブを回転させながら空白マスを追っていこう。";
      }
    }

    function isSolved() {
      return tiles.every((num, index) => num === goal[index]);
    }

    function shuffle() {
      resetState();
      tiles = [...goal];

      let previousEmptyIndex = -1;

      for (let i = 0; i < 1000; i++) {
        const emptyIndex = getEmptyIndex();

        let candidates = getMovableIndexes(emptyIndex)
          .filter(index => index !== previousEmptyIndex);

        if (candidates.length === 0) {
          candidates = getMovableIndexes(emptyIndex);
        }

        const picked = candidates[Math.floor(Math.random() * candidates.length)];

        [tiles[picked], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[picked]];
        previousEmptyIndex = emptyIndex;
      }

      moves = 0;
      messageEl.textContent = "スタート！黄色いワイヤーが空白マス。隣接タイルをクリックして動かそう。";
      buildSceneFromTiles();
    }

    function reset() {
      resetState();
      tiles = [...goal];
      moves = 0;
      messageEl.textContent = "完成形に戻しました。シャッフルで再スタート！";
      buildSceneFromTiles();
    }

    function resetState() {
      stopTimer();
      started = false;
      cleared = false;
      showHints = false;
      moves = 0;
      startTime = 0;
      timeEl.textContent = "0.0s";
      hintBtn.textContent = "ヒント";
    }

    function startTimer() {
      startTime = performance.now();

      timerId = setInterval(() => {
        const seconds = (performance.now() - startTime) / 1000;
        timeEl.textContent = seconds.toFixed(1) + "s";
      }, 100);
    }

    function stopTimer() {
      if (timerId !== null) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function gameClear() {
      cleared = true;

      const seconds = (performance.now() - startTime) / 1000;

      stopTimer();
      timeEl.textContent = seconds.toFixed(1) + "s";

      messageEl.innerHTML = `
        <span class="clear">CLEAR!</span><br>
        クリアタイム：${seconds.toFixed(1)}秒 / 手数：${moves}手
      `;

      saveBest(moves, seconds);
    }

    function saveBest(currentMoves, currentSeconds) {
      const old = JSON.parse(localStorage.getItem("puzzle63_3d_best") || "null");

      const shouldUpdate =
        !old ||
        currentMoves < old.moves ||
        (currentMoves === old.moves && currentSeconds < old.seconds);

      if (shouldUpdate) {
        localStorage.setItem("puzzle63_3d_best", JSON.stringify({
          moves: currentMoves,
          seconds: currentSeconds
        }));

        messageEl.innerHTML += "<br>自己ベスト更新！";
        updateBestDisplay();
      }
    }

    function updateBestDisplay() {
      const best = JSON.parse(localStorage.getItem("puzzle63_3d_best") || "null");

      if (!best) {
        bestEl.textContent = "--";
      } else {
        bestEl.textContent = `${best.moves}手`;
      }
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();

      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);

      const intersects = raycaster.intersectObjects(tileMeshes, false);

      if (intersects.length > 0) {
        const mesh = intersects[0].object;
        moveTile(mesh.userData.index);
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      controls.update();

      if (emptyWire) {
        emptyWire.rotation.x += 0.01;
        emptyWire.rotation.y += 0.013;
      }

      cubeGroup.rotation.y += 0.0015;

      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }

    shuffleBtn.addEventListener("click", shuffle);
    resetBtn.addEventListener("click", reset);

    hintBtn.addEventListener("click", () => {
      showHints = !showHints;
      hintBtn.textContent = showHints ? "ヒントOFF" : "ヒント";
      buildSceneFromTiles();
    });

    window.addEventListener("pointerdown", onPointerDown);
    window.addEventListener("resize", onResize);

    animate();
  </script>
</body>
</html>
