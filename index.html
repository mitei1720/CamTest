<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>63 Puzzle - 3D Slide Puzzle</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
      background:
        radial-gradient(circle at top left, #273c75, transparent 35%),
        radial-gradient(circle at bottom right, #9c27b0, transparent 35%),
        linear-gradient(135deg, #050510, #101020);
      padding: 22px;
    }

    .app {
      width: min(1100px, 100%);
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.1rem, 6vw, 4.5rem);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
      text-shadow:
        0 0 12px rgba(0, 234, 255, 0.9),
        0 0 30px rgba(255, 78, 205, 0.45);
    }

    .subtitle {
      color: rgba(255,255,255,0.78);
      line-height: 1.7;
      margin-bottom: 18px;
      font-size: 0.95rem;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 0 auto 16px;
      max-width: 720px;
    }

    .status-card {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
    }

    .label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.62);
      margin-bottom: 4px;
    }

    .value {
      font-size: 1.25rem;
      font-weight: 900;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    button.action {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      color: white;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(90deg, #00eaff, #ff4ecd);
      box-shadow: 0 0 18px rgba(0, 234, 255, 0.35);
    }

    button.action.secondary {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: none;
    }

    .cube {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .layer {
      border-radius: 22px;
      padding: 10px;
      background:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px),
        rgba(0,0,0,0.34);
      background-size: 22px 22px;
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow:
        0 0 24px rgba(0, 234, 255, 0.14),
        inset 0 0 24px rgba(255,255,255,0.035);
      transition: 0.2s ease;
    }

    .layer.active {
      border-color: rgba(255, 230, 109, 0.85);
      box-shadow:
        0 0 28px rgba(255, 230, 109, 0.28),
        inset 0 0 24px rgba(255,255,255,0.04);
    }

    .layer-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.86);
      font-size: 0.85rem;
      font-weight: 800;
    }

    .empty-marker {
      font-size: 0.75rem;
      color: #ffe66d;
      opacity: 0;
    }

    .layer.active .empty-marker {
      opacity: 1;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      aspect-ratio: 1 / 1;
    }

    .tile,
    .empty {
      border-radius: 12px;
      min-width: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .tile {
      border: none;
      color: white;
      font-weight: 900;
      cursor: pointer;
      font-size: clamp(0.78rem, 2.4vw, 1.28rem);
      background: linear-gradient(135deg, #00eaff, #6c5ce7);
      box-shadow:
        0 0 12px rgba(0, 234, 255, 0.35),
        inset 0 0 12px rgba(255,255,255,0.12);
      transition:
        transform 0.1s ease,
        box-shadow 0.1s ease,
        filter 0.1s ease;
    }

    .tile:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 0 18px rgba(255, 78, 205, 0.45),
        inset 0 0 12px rgba(255,255,255,0.13);
    }

    .tile:active {
      transform: scale(0.95);
    }

    .tile.correct {
      background: linear-gradient(135deg, #ffe66d, #ff4ecd);
      box-shadow:
        0 0 14px rgba(255, 230, 109, 0.38),
        inset 0 0 12px rgba(255,255,255,0.13);
    }

    .tile.movable {
      outline: 2px solid rgba(255,255,255,0.85);
      filter: brightness(1.2);
    }

    .empty {
      background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,255,255,0.2);
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.34);
      font-size: 0.75rem;
    }

    .message {
      min-height: 54px;
      line-height: 1.65;
      color: rgba(255,255,255,0.84);
      font-size: 0.95rem;
    }

    .clear {
      color: #ffe66d;
      font-weight: 900;
      text-shadow: 0 0 12px rgba(255, 230, 109, 0.85);
    }

    .help {
      max-width: 760px;
      margin: 14px auto 0;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.78);
      line-height: 1.7;
      font-size: 0.88rem;
      text-align: left;
    }

    @media (max-width: 900px) {
      .cube {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 14px;
      }

      .status {
        grid-template-columns: repeat(2, 1fr);
      }

      .cube {
        grid-template-columns: 1fr;
      }

      .layer {
        padding: 9px;
      }

      .tile {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>63 PUZZLE</h1>

    <p class="subtitle">
      4×4×4の三次元スライドパズル。<br>
      空きマスの上下左右、さらに上下階の同じ位置にあるタイルを動かせます。
    </p>

    <section class="status">
      <div class="status-card">
        <div class="label">MOVES</div>
        <div class="value" id="moves">0</div>
      </div>
      <div class="status-card">
        <div class="label">TIME</div>
        <div class="value" id="time">0.0s</div>
      </div>
      <div class="status-card">
        <div class="label">EMPTY</div>
        <div class="value" id="emptyPos">--</div>
      </div>
      <div class="status-card">
        <div class="label">BEST</div>
        <div class="value" id="best">--</div>
      </div>
    </section>

    <div class="controls">
      <button class="action" id="shuffleBtn">シャッフル</button>
      <button class="action secondary" id="resetBtn">リセット</button>
      <button class="action secondary" id="hintBtn">動かせるタイルを表示</button>
    </div>

    <section class="cube" id="cube"></section>

    <p class="message" id="message">
      「シャッフル」を押してスタート！
    </p>

    <div class="help">
      <strong>遊び方：</strong>
      数字を 1〜63 の順に並べ、最後のマスを空白にするとクリアです。
      4つのボードは上から順に 1F, 2F, 3F, 4F を表しています。
      空きマスと同じ階の上下左右だけでなく、同じ座標の上階・下階のタイルもスライドできます。
    </div>
  </main>

  <script>
    const cubeEl = document.getElementById("cube");
    const movesEl = document.getElementById("moves");
    const timeEl = document.getElementById("time");
    const emptyPosEl = document.getElementById("emptyPos");
    const bestEl = document.getElementById("best");
    const messageEl = document.getElementById("message");

    const shuffleBtn = document.getElementById("shuffleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const hintBtn = document.getElementById("hintBtn");

    const N = 4;
    const TOTAL = N * N * N;
    const goal = Array.from({ length: TOTAL }, (_, i) => i === TOTAL - 1 ? 0 : i + 1);

    let tiles = [...goal];
    let moves = 0;
    let started = false;
    let cleared = false;
    let timerId = null;
    let startTime = 0;
    let showHints = false;

    updateBestDisplay();
    render();

    function indexToXYZ(index) {
      const z = Math.floor(index / (N * N));
      const rest = index % (N * N);
      const y = Math.floor(rest / N);
      const x = rest % N;
      return { x, y, z };
    }

    function xyzToIndex(x, y, z) {
      return z * N * N + y * N + x;
    }

    function getEmptyIndex() {
      return tiles.indexOf(0);
    }

    function isNeighbor3D(a, b) {
      const A = indexToXYZ(a);
      const B = indexToXYZ(b);

      const distance =
        Math.abs(A.x - B.x) +
        Math.abs(A.y - B.y) +
        Math.abs(A.z - B.z);

      return distance === 1;
    }

    function getMovableIndexes(emptyIndex) {
      const { x, y, z } = indexToXYZ(emptyIndex);
      const candidates = [];

      if (x > 0) candidates.push(xyzToIndex(x - 1, y, z));
      if (x < N - 1) candidates.push(xyzToIndex(x + 1, y, z));
      if (y > 0) candidates.push(xyzToIndex(x, y - 1, z));
      if (y < N - 1) candidates.push(xyzToIndex(x, y + 1, z));
      if (z > 0) candidates.push(xyzToIndex(x, y, z - 1));
      if (z < N - 1) candidates.push(xyzToIndex(x, y, z + 1));

      return candidates;
    }

    function render() {
      cubeEl.innerHTML = "";

      const emptyIndex = getEmptyIndex();
      const empty = indexToXYZ(emptyIndex);
      const movable = getMovableIndexes(emptyIndex);

      emptyPosEl.textContent = `${empty.z + 1}F`;

      for (let z = 0; z < N; z++) {
        const layer = document.createElement("section");
        layer.className = "layer";

        if (z === empty.z) {
          layer.classList.add("active");
        }

        const title = document.createElement("div");
        title.className = "layer-title";
        title.innerHTML = `
          <span>${z + 1}F</span>
          <span class="empty-marker">EMPTY</span>
        `;
        layer.appendChild(title);

        const board = document.createElement("div");
        board.className = "board";

        for (let y = 0; y < N; y++) {
          for (let x = 0; x < N; x++) {
            const index = xyzToIndex(x, y, z);
            const num = tiles[index];

            if (num === 0) {
              const emptyCell = document.createElement("div");
              emptyCell.className = "empty";
              emptyCell.textContent = "空";
              board.appendChild(emptyCell);
              continue;
            }

            const button = document.createElement("button");
            button.className = "tile";
            button.textContent = num;

            if (num === goal[index]) {
              button.classList.add("correct");
            }

            if (showHints && movable.includes(index)) {
              button.classList.add("movable");
            }

            button.addEventListener("click", () => moveTile(index));
            board.appendChild(button);
          }
        }

        layer.appendChild(board);
        cubeEl.appendChild(layer);
      }

      movesEl.textContent = moves;
    }

    function moveTile(index) {
      if (cleared) return;

      const emptyIndex = getEmptyIndex();

      if (!isNeighbor3D(index, emptyIndex)) {
        messageEl.textContent = "そのタイルは動かせない！空きマスに3次元的に隣接しているタイルだけ動かせます。";
        return;
      }

      if (!started) {
        startTimer();
        started = true;
      }

      [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
      moves++;

      render();

      if (isSolved()) {
        gameClear();
      } else {
        const empty = indexToXYZ(getEmptyIndex());
        messageEl.textContent = `移動成功。空きマスは ${empty.z + 1}F にあります。`;
      }
    }

    function isSolved() {
      return tiles.every((num, index) => num === goal[index]);
    }

    function shuffle() {
      resetState();
      tiles = [...goal];

      let previousEmptyIndex = -1;

      for (let i = 0; i < 1200; i++) {
        const emptyIndex = getEmptyIndex();

        let candidates = getMovableIndexes(emptyIndex)
          .filter(index => index !== previousEmptyIndex);

        if (candidates.length === 0) {
          candidates = getMovableIndexes(emptyIndex);
        }

        const picked = candidates[Math.floor(Math.random() * candidates.length)];

        [tiles[picked], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[picked]];
        previousEmptyIndex = emptyIndex;
      }

      moves = 0;
      messageEl.textContent = "スタート！空きマスに隣接するタイルを動かそう。";
      render();
    }

    function reset() {
      resetState();
      tiles = [...goal];
      moves = 0;
      messageEl.textContent = "完成形に戻しました。シャッフルで再スタート！";
      render();
    }

    function resetState() {
      stopTimer();
      started = false;
      cleared = false;
      showHints = false;
      moves = 0;
      startTime = 0;
      timeEl.textContent = "0.0s";
    }

    function startTimer() {
      startTime = performance.now();

      timerId = setInterval(() => {
        const seconds = (performance.now() - startTime) / 1000;
        timeEl.textContent = seconds.toFixed(1) + "s";
      }, 100);
    }

    function stopTimer() {
      if (timerId !== null) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function gameClear() {
      cleared = true;
      stopTimer();

      const seconds = Number(timeEl.textContent.replace("s", ""));

      messageEl.innerHTML = `
        <span class="clear">CLEAR!</span><br>
        ${moves}手 / ${seconds.toFixed(1)}秒で63パズルを制覇！
      `;

      saveBest(moves, seconds);
    }

    function saveBest(currentMoves, currentSeconds) {
      const old = JSON.parse(localStorage.getItem("puzzle63Best") || "null");

      const shouldUpdate =
        !old ||
        currentMoves < old.moves ||
        (currentMoves === old.moves && currentSeconds < old.seconds);

      if (shouldUpdate) {
        localStorage.setItem("puzzle63Best", JSON.stringify({
          moves: currentMoves,
          seconds: currentSeconds
        }));

        messageEl.innerHTML += "<br>自己ベスト更新！";
        updateBestDisplay();
      }
    }

    function updateBestDisplay() {
      const best = JSON.parse(localStorage.getItem("puzzle63Best") || "null");

      if (!best) {
        bestEl.textContent = "--";
      } else {
        bestEl.textContent = `${best.moves}手`;
      }
    }

    shuffleBtn.addEventListener("click", shuffle);

    resetBtn.addEventListener("click", reset);

    hintBtn.addEventListener("click", () => {
      showHints = !showHints;
      hintBtn.textContent = showHints ? "ヒントを隠す" : "動かせるタイルを表示";
      render();
    });

    document.addEventListener("keydown", (e) => {
      const emptyIndex = getEmptyIndex();
      const { x, y, z } = indexToXYZ(emptyIndex);

      let target = null;

      if (e.key === "ArrowLeft" && x < N - 1) {
        target = xyzToIndex(x + 1, y, z);
      }

      if (e.key === "ArrowRight" && x > 0) {
        target = xyzToIndex(x - 1, y, z);
      }

      if (e.key === "ArrowUp" && y < N - 1) {
        target = xyzToIndex(x, y + 1, z);
      }

      if (e.key === "ArrowDown" && y > 0) {
        target = xyzToIndex(x, y - 1, z);
      }

      if ((e.key === "q" || e.key === "Q") && z < N - 1) {
        target = xyzToIndex(x, y, z + 1);
      }

      if ((e.key === "e" || e.key === "E") && z > 0) {
        target = xyzToIndex(x, y, z - 1);
      }

      if (target !== null) {
        moveTile(target);
      }
    });
  </script>
</body>
</html>
